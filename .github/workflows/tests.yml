name: "Reusable Tests Workflow"

on:
  workflow_call:
    inputs:
      julia-version:
        description: "Julia version"
        default: "1"
        required: false
        type: string
      julia-arch:
        description: "Architecture of Julia to be used"
        required: false
        type: string
      project:
        description: "The value is passed to Julia's `--project` flag"
        default: '@.'
        required: false
        type: string
      group:
        description: "The 'GROUP' of tests that need to be run. This will requires an ENV `GROUP` to be (conditionally) defined within your package tests as well to selectively run groups of tests"
        default: ""
        required: false
        type: string
      num-threads:
        description: "Value of JULIA_NUM_THREADS for the test run (e.g. set to 2 to exercise multi-threaded code paths)"
        default: "1"
        required: false
        type: string
      self-hosted:
        description: "Run the job needs on a self hosted machine"
        default: false
        required: false
        type: boolean
      os:
        description: "The machine configuration on which the job needs to be run"
        default: "ubuntu-latest"
        required: false
        type: string
      cache:
        description: "Use the julia-actions/cache action for caching"
        default: true
        required: false
        type: boolean
      buildpkg:
        description: "Use the julia-actions/buildpkg action to build the package first"
        default: true
        required: false
        type: boolean
      coverage:
        description: "Collect and generate code coverage-related information"
        default: true
        required: false
        type: boolean
      coverage-directories:
        description: "Comma-separated list of directories where the julia-processcoverage action will look for coverage information (e.g. `src,examples`)"
        default: "src,ext"
        required: false
        type: string
      julia-runtest-depwarn:
        description: "Value of the --depwarn flag while running Julia"
        default: "yes"
        required: false
        type: string
      continue-on-error:
        description: "Prevent the workflow run from failing if/when the job fails"
        required: false
        type: boolean

jobs:
  tests:
    name: "Tests${{ inputs.group != '' && format(' - {0}', inputs.group) || '' }}"
    continue-on-error: ${{ inputs.continue-on-error || inputs.julia-version == 'nightly' }}
    runs-on: "${{ inputs.self-hosted && 'self-hosted' || inputs.os }}"
    steps:
      - uses: actions/checkout@v6

      - name: "Setup Julia ${{ inputs.julia-version }}"
        uses: julia-actions/setup-julia@v3
        with:
          version: "${{ inputs.julia-version }}"
          arch: "${{ inputs.julia-arch || runner.arch }}"

      - uses: julia-actions/cache@v3
        if: "${{ inputs.cache }}"
        with:
          token: "${{ secrets.GITHUB_TOKEN }}"

      - name: "Develop in-repo [sources] path deps of ${{ inputs.project }}"
        if: "${{ inputs.buildpkg && inputs.project != '@.' && inputs.project != '.' }}"
        shell: julia --color=yes {0}
        run: |
          using Pkg
          proj = raw"${{ inputs.project }}"
          # On Julia < 1.11 the [sources] section is not auto-resolved during
          # build/test, so develop any in-repo path deps the sub-project (e.g. a
          # lib/* sublibrary) declares. No-op on >= 1.11 and for projects without
          # a [sources] section.
          if VERSION < v"1.11.0-DEV.0"
            tomlpath = joinpath(proj, "Project.toml")
            if isfile(tomlpath)
              toml = Pkg.TOML.parsefile(tomlpath)
              if haskey(toml, "sources")
                Pkg.activate(proj)
                specs = Pkg.PackageSpec[]
                for (dep, spec) in toml["sources"]
                  if spec isa Dict && haskey(spec, "path")
                    p = normpath(joinpath(proj, spec["path"]))
                    isdir(p) && push!(specs, Pkg.PackageSpec(path = p))
                  end
                end
                isempty(specs) || Pkg.develop(specs)
              end
            end
          end

      - uses: julia-actions/julia-buildpkg@v1
        if: "${{ inputs.buildpkg }}"
        with:
          project: "${{ inputs.project }}"

      - name: "Run tests ${{ inputs.self-hosted && '' || format('on {0}', inputs.os) }} with Julia v${{ inputs.julia-version }}"
        uses: julia-actions/julia-runtest@v1
        with:
          project: "${{ inputs.project }}"
          depwarn: "${{ inputs.julia-runtest-depwarn }}"
          coverage: "${{ inputs.coverage }}"
        env:
          GROUP: "${{ inputs.group }}"
          JULIA_NUM_THREADS: "${{ inputs.num-threads }}"

      - uses: julia-actions/julia-processcoverage@v1
        if: "${{ inputs.coverage }}"
        with:
          directories: "${{ inputs.coverage-directories }}"

      - name: "Report Coverage with Codecov"
        uses: codecov/codecov-action@v6
        if: "${{ inputs.coverage }}"
        with:
          files: lcov.info
          token: "${{ secrets.CODECOV_TOKEN }}"
