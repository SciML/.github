name: "Reusable Spell Check Workflow"

on:
  workflow_call:

jobs:
  typos-check:
    name: "Spell Check with Typos"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Actions Repository"
        uses: actions/checkout@v6

      - name: "Check spelling"
        uses: crate-ci/typos@v1.47.2
