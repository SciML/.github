name: "Reusable Downgrade Compatibility Test Workflow"

on:
  workflow_call:
    inputs:
      julia-version:
        description: "Julia version (downgrade tests the minimum-supported Julia floor; defaults to the LTS alias 'lts', currently 1.10, tracking the LTS as it advances)"
        default: "lts"
        required: false
        type: string
      group:
        description: "The 'GROUP' of tests that need to be run. This requires an ENV `GROUP` to be (conditionally) defined within your package tests as well to selectively run groups of tests"
        default: ""
        required: false
        type: string
      skip:
        description: "ADDITIONAL deps to skip when downgrading, beyond the auto-included Julia stdlibs (comma-separated; unioned into the effective skip passed to julia-actions/julia-downgrade-compat)"
        default: ""
        required: false
        type: string
      projects:
        description: "Comma-separated list of project directories to downgrade (passed to julia-actions/julia-downgrade-compat)"
        default: "."
        required: false
        type: string
      project:
        description: "Value passed to --project for build & test (e.g. a workspace submodule or lib/X). Default '@.' builds/tests the repo root."
        default: "@."
        required: false
        type: string
      mode:
        description: "julia-downgrade-compat mode: deps (direct), alldeps (deps+weakdeps), weakdeps, or forcedeps (strict lower-bound verification). Empty maps to 'deps' (the action rejects an empty mode)."
        default: "deps"
        required: false
        type: string
      self-hosted:
        description: "Run the job on a self hosted machine"
        default: false
        required: false
        type: boolean
      os:
        description: "The machine configuration on which the job needs to be run"
        default: "ubuntu-latest"
        required: false
        type: string

jobs:
  downgrade:
    name: "Downgrade Tests${{ inputs.group != '' && format(' - {0}', inputs.group) || '' }}"
    runs-on: "${{ inputs.self-hosted && 'self-hosted' || inputs.os }}"
    steps:
      - uses: actions/checkout@v6

      - uses: julia-actions/setup-julia@v3
        with:
          version: "${{ inputs.julia-version }}"

      - name: "Compute effective downgrade skip list"
        run: |
          # Effective skip = Julia stdlibs  ∪  the caller's `skip` input (extra
          # skips). Standard libraries are always in-tree at their pinned
          # version, so they must never be downgrade-pinned. Enumerate them
          # robustly from Pkg (the dict is keyed by UUID, so take the NAME from
          # each value; the value is (name, version) on recent Julia and a
          # String on older).
          stdlibs="$(julia --startup-file=no -e '
            using Pkg
            ns = String[]
            for v in values(Pkg.Types.stdlibs())
                push!(ns, v isa AbstractString ? v : first(v))
            end
            println(join(sort(unique(ns)), ","))
          ')"
          echo "Julia stdlibs: $stdlibs"
          effective="$stdlibs"
          # Any dep declared in a project's `[sources]` table is satisfied
          # in-tree by a path/url checkout (not the registry), so its version is
          # whatever that checkout is. julia-downgrade-compat would rewrite its
          # `[compat]` to `=<floor>`, which the in-tree version can't satisfy ->
          # "Unsatisfiable requirements ... no versions left". Skip every
          # `[sources]` dep name across all `projects` dirs.
          IFS=',' read -ra _dirs <<< "${{ inputs.projects }}"
          for dir in "${_dirs[@]}"; do
              dir="$(echo "$dir" | xargs)"   # trim surrounding whitespace
              [ -n "$dir" ] || continue
              f="$dir/Project.toml"
              if [ ! -f "$f" ]; then
                  echo "No Project.toml in '$dir', skipping [sources] scan"
                  continue
              fi
              names="$(julia --startup-file=no -e '
                using TOML
                src = get(TOML.parsefile(ARGS[1]), "sources", Dict())
                println(join(collect(keys(src)), ","))
              ' "$f")"
              if [ -n "$names" ]; then
                  echo "[sources] deps in $dir: $names"
                  effective="$effective,$names"
              fi
          done
          [ -n "${{ inputs.skip }}" ] && effective="$effective,${{ inputs.skip }}"
          echo "Effective downgrade skip: $effective"
          echo "EFFECTIVE_SKIP=$effective" >> "$GITHUB_ENV"

      - uses: julia-actions/julia-downgrade-compat@v2
        with:
          skip: "${{ env.EFFECTIVE_SKIP }}"
          projects: "${{ inputs.projects }}"
          mode: "${{ inputs.mode != '' && inputs.mode || 'deps' }}"

      - uses: julia-actions/julia-buildpkg@v1
        with:
          project: "${{ inputs.project }}"

      - uses: julia-actions/julia-runtest@v1
        with:
          project: "${{ inputs.project }}"
          allow_reresolve: false
          # 'auto' flips to true on Dependabot/CompatHelper PRs, which demands the
          # latest compatible versions — the exact opposite of a downgraded manifest —
          # and fails resolution (e.g. "empty intersection between X@min and project
          # compatibility latest"). Downgrade tests must keep the minimum versions.
          force_latest_compatible_version: false
        env:
          GROUP: "${{ inputs.group }}"
