name: "Reusable Tests Workflow"

on:
  workflow_call:
    inputs:
      julia-version:
        description: "Julia version"
        default: "1"
        required: false
        type: string
      julia-arch:
        description: "Architecture of Julia to be used"
        required: false
        type: string
      project:
        description: "The value is passed to Julia's `--project` flag"
        default: '@.'
        required: false
        type: string
      group:
        description: "The 'GROUP' of tests that need to be run. This will requires an ENV `GROUP` to be (conditionally) defined within your package tests as well to selectively run groups of tests"
        default: ""
        required: false
        type: string
      num-threads:
        description: "Value of JULIA_NUM_THREADS for the test run. Default 'auto' matches the runner's vCPU count (e.g. 4 on GitHub-hosted). On self-hosted runners 'auto' is overridden to 2 (those runners are large and shared, so matching the full core count would oversubscribe); pass an explicit integer to control it on self-hosted."
        default: "auto"
        required: false
        type: string
      self-hosted:
        description: "Run the job needs on a self hosted machine"
        default: false
        required: false
        type: boolean
      os:
        description: "The machine configuration on which the job needs to be run"
        default: "ubuntu-latest"
        required: false
        type: string
      cache:
        description: "Use the julia-actions/cache action for caching"
        default: false
        required: false
        type: boolean
      buildpkg:
        description: "Use the julia-actions/buildpkg action to build the package first"
        default: true
        required: false
        type: boolean
      coverage:
        description: "Collect and generate code coverage-related information"
        default: true
        required: false
        type: boolean
      coverage-directories:
        description: "Comma-separated list of directories where the julia-processcoverage action will look for coverage information (e.g. `src,examples`)"
        default: "src,ext"
        required: false
        type: string
      julia-runtest-depwarn:
        description: "Value of the --depwarn flag while running Julia"
        default: "yes"
        required: false
        type: string
      continue-on-error:
        description: "Prevent the workflow run from failing if/when the job fails"
        required: false
        type: boolean
      runner:
        description: "JSON-encoded runs-on value (string or array of labels, e.g. '[\"self-hosted\",\"Linux\",\"X64\",\"gpu\"]'). When non-empty it overrides self-hosted/os."
        default: ""
        required: false
        type: string
      timeout-minutes:
        description: "Job timeout in minutes"
        default: 360
        required: false
        type: number
      check-bounds:
        description: "Value of julia-runtest's check_bounds (yes/no/auto)"
        default: "yes"
        required: false
        type: string
      allow-reresolve:
        description: "Value of julia-runtest's allow_reresolve"
        default: true
        required: false
        type: boolean
      group-env-name:
        description: "Name of the environment variable to set to `group` for the test run (e.g. GROUP or ODEDIFFEQ_TEST_GROUP)"
        default: "GROUP"
        required: false
        type: string
      apt-packages:
        description: "Space-separated apt packages to install before building/testing (for packages with system dependencies, e.g. R / Python / FEniCS wrappers). Linux runners only."
        default: ""
        required: false
        type: string
      container:
        description: "Docker container image to run the job in, e.g. for Python-stack packages (empty string = no container)"
        default: ""
        required: false
        type: string
      force-latest-compatible-version:
        description: "Value of julia-runtest's force_latest_compatible_version"
        default: false
        required: false
        type: boolean
      dotgithub-ref:
        description: "Ref of SciML/.github to source the develop-sources helper script from"
        default: "v1"
        required: false
        type: string

jobs:
  tests:
    name: "Tests${{ inputs.group != '' && format(' - {0}', inputs.group) || '' }} (Julia ${{ inputs.julia-version }})"
    continue-on-error: ${{ inputs.continue-on-error || inputs.julia-version == 'nightly' }}
    # Legs that provision system deps need passwordless sudo / docker, which the
    # SciML self-hosted demeter*/arctic* pool lacks. Those runners squat only the
    # `ubuntu-latest` label (not `ubuntu-24.04`), so when apt-packages or a
    # container is requested, pin `ubuntu-24.04` to force a GitHub-hosted runner;
    # otherwise keep the existing default (matrix `runner` / self-hosted / os),
    # which stays self-hosted-capable for throughput. fromJSON('["ubuntu-24.04"]')
    # returns a non-empty (truthy) array, so the ternary doesn't fall through.
    runs-on: ${{ (inputs.apt-packages != '' || inputs.container != '') && fromJSON('["ubuntu-24.04"]') || (inputs.runner != '' && fromJson(inputs.runner) || (inputs.self-hosted && 'self-hosted' || inputs.os)) }}
    container: ${{ inputs.container }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    steps:
      - uses: actions/checkout@v6

      - name: "Setup Julia ${{ inputs.julia-version }}"
        uses: julia-actions/setup-julia@v3
        with:
          version: "${{ inputs.julia-version }}"
          arch: "${{ inputs.julia-arch || runner.arch }}"

      - uses: julia-actions/cache@v3
        # Skip caching on self-hosted runners: demeter has a persistent, already
        # warm depot (20-29GB), so the cache always MISSES and the post-job save
        # tar-uploads 20-29GB at ~7MB/s (+30-62 min/job). Only useful on
        # GitHub-hosted/ephemeral runners (empty `runner` and not `self-hosted`).
        if: "${{ inputs.cache && inputs.runner == '' && !inputs.self-hosted }}"
        with:
          token: "${{ secrets.GITHUB_TOKEN }}"

      - name: "Checkout SciML/.github for the develop-sources helper"
        if: "${{ inputs.buildpkg && inputs.project != '@.' && inputs.project != '.' }}"
        uses: actions/checkout@v6
        with:
          repository: SciML/.github
          ref: "${{ inputs.dotgithub-ref }}"
          path: .sciml-dotgithub

      - name: "Develop in-repo [sources] path deps of ${{ inputs.project }}"
        # On Julia < 1.11 the [sources] section is not auto-resolved during
        # build/test, so develop the in-repo path deps the sub-project (e.g. a
        # lib/* sublibrary) declares -- transitively, but skipping a developed
        # dependency's *test-only* [sources] so they don't become phantom direct
        # deps (SciML/Optimization.jl#1228). No-op on >= 1.11. See
        # scripts/develop_sources.jl for the full rationale.
        if: "${{ inputs.buildpkg && inputs.project != '@.' && inputs.project != '.' }}"
        shell: julia --color=yes {0}
        run: |
          # `shell: julia {0}` writes this body to a temp file under RUNNER_TEMP and
          # runs it from there, so a *relative* `include` resolves against RUNNER_TEMP,
          # not the workspace where `.sciml-dotgithub` was checked out. Anchor at
          # GITHUB_WORKSPACE so it resolves regardless of the script's location.
          include(joinpath(ENV["GITHUB_WORKSPACE"], ".sciml-dotgithub", "scripts", "develop_sources.jl"))
          develop_sources(raw"${{ inputs.project }}")

      - name: "Install system packages"
        if: "${{ inputs.apt-packages != '' && runner.os == 'Linux' }}"
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ inputs.apt-packages }}

      - uses: julia-actions/julia-buildpkg@v1
        if: "${{ inputs.buildpkg }}"
        with:
          project: "${{ inputs.project }}"

      - name: "Set test group env (${{ inputs.group-env-name }})"
        # Set the group under a configurable env var name so sublibraries that
        # read e.g. ODEDIFFEQ_TEST_GROUP work the same as the default GROUP. The
        # name must be dynamic, which the env: map can't express, so write it to
        # $GITHUB_ENV here.
        run: echo "${{ inputs.group-env-name }}=${{ inputs.group }}" >> "$GITHUB_ENV"

      - name: "Run tests ${{ inputs.self-hosted && '' || format('on {0}', inputs.os) }} with Julia v${{ inputs.julia-version }}"
        uses: julia-actions/julia-runtest@v1
        with:
          project: "${{ inputs.project }}"
          depwarn: "${{ inputs.julia-runtest-depwarn }}"
          coverage: "${{ inputs.coverage }}"
          check_bounds: "${{ inputs.check-bounds }}"
          allow_reresolve: ${{ inputs.allow-reresolve }}
          force_latest_compatible_version: ${{ inputs.force-latest-compatible-version }}
        env:
          # Match the runner's vCPUs (auto) on hosted runners; but on large,
          # shared self-hosted runners fall back to 2 when left at 'auto' to
          # avoid oversubscribing (an explicit integer is always honored).
          JULIA_NUM_THREADS: "${{ (inputs.self-hosted && inputs.num-threads == 'auto') && '2' || inputs.num-threads }}"

      - name: "Filter coverage directories to those that exist"
        # julia-processcoverage hard-errors on directories that don't exist
        # (e.g. lib/<name>/ext for sublibraries without extensions), so drop
        # the missing entries here and skip coverage entirely if none remain.
        id: coverage-dirs
        if: "${{ inputs.coverage }}"
        shell: bash
        env:
          COVERAGE_DIRECTORIES: "${{ inputs.coverage-directories }}"
        run: |
          existing=""
          IFS=',' read -ra requested <<< "$COVERAGE_DIRECTORIES"
          for dir in "${requested[@]}"; do
            if [ -d "$dir" ]; then
              existing="${existing:+$existing,}$dir"
            else
              echo "Skipping missing coverage directory: $dir"
            fi
          done
          echo "directories=$existing" >> "$GITHUB_OUTPUT"

      - uses: julia-actions/julia-processcoverage@v1
        if: "${{ inputs.coverage && steps.coverage-dirs.outputs.directories != '' }}"
        with:
          directories: "${{ steps.coverage-dirs.outputs.directories }}"

      - name: "Report Coverage with Codecov"
        uses: codecov/codecov-action@v7
        if: "${{ inputs.coverage && steps.coverage-dirs.outputs.directories != '' }}"
        continue-on-error: true
        with:
          files: lcov.info
          token: "${{ secrets.CODECOV_TOKEN }}"
          disable_safe_directory: true
          fail_ci_if_error: false
