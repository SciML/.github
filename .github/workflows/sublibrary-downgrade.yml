name: "Reusable Sublibrary Downgrade Workflow"

# Runs downgrade-compat tests for each sublibrary under lib/*. The sublibrary
# list is discovered automatically (every lib/<name> with a Project.toml),
# minus any names in `exclude`.

on:
  workflow_call:
    inputs:
      julia-version:
        description: "Julia version to run the downgrade tests on (downgrade tests the minimum-supported Julia floor; defaults to the LTS alias 'lts', currently 1.10, tracking the LTS as it advances)"
        default: "lts"
        required: false
        type: string
      skip:
        description: "ADDITIONAL deps to skip when downgrading, beyond the auto-included Julia stdlibs and in-repo lib/* sublibraries (comma-separated; unioned into the effective skip passed to julia-downgrade-compat)"
        default: ""
        required: false
        type: string
      projects:
        description: "Space-separated explicit list of lib/* sublibrary paths to downgrade-test. If empty, every lib/<name> with a Project.toml is used (minus `exclude`)."
        default: ""
        required: false
        type: string
      exclude:
        description: "Space-separated lib/* sublibrary directory names to exclude (applies only when `projects` is empty / auto-discovery)"
        default: ""
        required: false
        type: string
      group-env-name:
        description: "Optional env var name to set as the test group for each sublibrary (e.g. ODEDIFFEQ_TEST_GROUP)"
        default: ""
        required: false
        type: string
      group-env-value:
        description: "Value for group-env-name, when set"
        default: ""
        required: false
        type: string
      apt-packages:
        description: "Space-separated apt packages to install before building/testing (Linux only)."
        default: ""
        required: false
        type: string
      container:
        description: "Docker container image to run the job in, e.g. for Python-stack packages (empty string = no container)"
        default: ""
        required: false
        type: string

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      projects: ${{ steps.list.outputs.projects }}
      has_any: ${{ steps.list.outputs.has_any }}
    steps:
      - uses: actions/checkout@v7
      - name: "List lib/* sublibraries with a Project.toml (minus exclude)"
        id: list
        run: |
          EXPLICIT="${{ inputs.projects }}"
          EXCLUDE="${{ inputs.exclude }}"
          projects=()
          if [ -n "$EXPLICIT" ]; then
            for p in $EXPLICIT; do projects+=("$p"); done
          else
            for d in lib/*/; do
              d="${d%/}"
              [ -f "$d/Project.toml" ] || continue
              name="$(basename "$d")"
              skipit=false
              for ex in $EXCLUDE; do [ "$ex" = "$name" ] && skipit=true; done
              $skipit || projects+=("$d")
            done
          fi
          # Build the JSON array in pure shell -- neither jq nor python3 is
          # guaranteed on a self-hosted runner. lib/* names have no JSON-special
          # characters, so plain quoting is safe.
          json=""
          for p in "${projects[@]}"; do
            [ -n "$p" ] || continue
            if [ -z "$json" ]; then json="\"$p\""; else json="$json,\"$p\""; fi
          done
          json="[$json]"
          echo "Sublibraries: $json"
          echo "projects=$json" >> "$GITHUB_OUTPUT"
          [ "$json" = "[]" ] && echo "has_any=false" >> "$GITHUB_OUTPUT" || echo "has_any=true" >> "$GITHUB_OUTPUT"

  test:
    needs: discover
    if: needs.discover.outputs.has_any == 'true'
    # apt-packages / container legs need passwordless sudo / docker, absent on
    # the SciML self-hosted demeter*/arctic* pool (which squats only the
    # `ubuntu-latest` label, not `ubuntu-24.04`). Pin `ubuntu-24.04` to force
    # GitHub-hosted in that case; otherwise keep `ubuntu-latest`, which the
    # self-hosted pool answers (throughput).
    runs-on: ${{ (inputs.apt-packages != '' || inputs.container != '') && fromJSON('["ubuntu-24.04"]') || 'ubuntu-latest' }}
    container: ${{ inputs.container }}
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJson(needs.discover.outputs.projects) }}
    steps:
      - uses: actions/checkout@v7
      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ inputs.julia-version }}
      - name: "Resolve numeric Julia version for downgrade-compat"
        run: echo "JULIA_MM=$(julia --startup-file=no -e 'print(VERSION.major, ".", VERSION.minor)')" >> "$GITHUB_ENV"
      - name: "Set sublibrary test group"
        if: "${{ inputs.group-env-name != '' }}"
        run: echo "${{ inputs.group-env-name }}=${{ inputs.group-env-value }}" >> "$GITHUB_ENV"
      - name: "Enumerate Julia standard libraries"
        run: |
          # Standard libraries are always in-tree at their pinned version, so
          # they must never be downgrade-pinned. Enumerate them robustly from
          # Pkg (the dict is keyed by UUID, so take the NAME from each value;
          # the value is (name, version) on recent Julia and a String on older).
          names="$(julia --startup-file=no -e '
            using Pkg
            ns = String[]
            for v in values(Pkg.Types.stdlibs())
                push!(ns, v isa AbstractString ? v : first(v))
            end
            println(join(sort(unique(ns)), ","))
          ')"
          echo "Julia stdlibs: $names"
          echo "STDLIB_SKIP=$names" >> "$GITHUB_ENV"
      - name: "Compute effective downgrade skip list"
        run: |
          # Effective skip = Julia stdlibs  ∪  in-repo lib/* sublibrary NAMES
          #                  ∪  the caller's `skip` input (extra skips).
          # In-repo path-[sources] sublibs must not be downgrade-pinned, so add
          # every lib/<name> directory name to the skip set.
          sublibs=""
          for d in lib/*/; do
            d="${d%/}"
            [ -f "$d/Project.toml" ] || continue
            name="$(basename "$d")"
            if [ -z "$sublibs" ]; then sublibs="$name"; else sublibs="$sublibs,$name"; fi
          done
          echo "In-repo sublibraries: $sublibs"
          effective="$STDLIB_SKIP"
          [ -n "$sublibs" ] && effective="$effective,$sublibs"
          # The sublibrary being downgraded (matrix.project) may itself declare a
          # `[sources]` table pointing at path/url deps (e.g. a sibling lib). Such
          # deps are satisfied in-tree by a checkout, not the registry, so
          # julia-downgrade-compat rewriting their `[compat]` to `=<floor>` yields
          # "Unsatisfiable requirements ... no versions left". The lib/* basename
          # skip above only covers deps whose source name matches a lib dir name;
          # parse the actual `[sources]` keys to also catch url/aliased sources.
          src_f="${{ matrix.project }}/Project.toml"
          if [ -f "$src_f" ]; then
              src_names="$(julia --startup-file=no -e '
                using TOML
                src = get(TOML.parsefile(ARGS[1]), "sources", Dict())
                println(join(collect(keys(src)), ","))
              ' "$src_f")"
              if [ -n "$src_names" ]; then
                  echo "[sources] deps in ${{ matrix.project }}: $src_names"
                  effective="$effective,$src_names"
              fi
          else
              echo "No Project.toml at $src_f, skipping [sources] scan"
          fi
          [ -n "${{ inputs.skip }}" ] && effective="$effective,${{ inputs.skip }}"
          echo "Effective downgrade skip: $effective"
          echo "EFFECTIVE_SKIP=$effective" >> "$GITHUB_ENV"
      - uses: julia-actions/julia-downgrade-compat@v2
        with:
          projects: ${{ matrix.project }}
          skip: ${{ env.EFFECTIVE_SKIP }}
          julia_version: ${{ env.JULIA_MM }}
      - name: "Keep resolved test extras reachable during build and test"
        env:
          DOWNGRADE_TEST_PROJECT: ${{ matrix.project }}
          DOWNGRADE_NO_PROMOTE: ""
        run: |
          project_dir="$DOWNGRADE_TEST_PROJECT"
          [ "$project_dir" = "@." ] && project_dir="."
          case "$project_dir" in
            @*) echo "Project must be a directory path or @.: $project_dir" >&2; exit 1 ;;
          esac
          project_file=""
          for filename in Project.toml JuliaProject.toml; do
            candidate="$project_dir/$filename"
            if [ -f "$candidate" ]; then project_file="$candidate"; break; fi
          done
          [ -n "$project_file" ] || { echo "No Project.toml or JuliaProject.toml in $project_dir" >&2; exit 1; }
          backup="$RUNNER_TEMP/sciml-downgrade-original-project.toml"
          cp -- "$project_file" "$backup"
          echo "DOWNGRADE_PROJECT_FILE=$project_file" >> "$GITHUB_ENV"
          echo "DOWNGRADE_PROJECT_BACKUP=$backup" >> "$GITHUB_ENV"
          julia --startup-file=no - "$DOWNGRADE_TEST_PROJECT" "$DOWNGRADE_NO_PROMOTE" <<'JULIA'
          using TOML

          function project_file(project::AbstractString)
              directory = project == "@." ? "." : project
              startswith(directory, "@") &&
                  error("project must be a directory path or @., got: $project")
              for filename in ("Project.toml", "JuliaProject.toml")
                  candidate = joinpath(directory, filename)
                  isfile(candidate) && return candidate
              end
              error("no Project.toml or JuliaProject.toml in $directory")
          end

          function write_project(path::AbstractString, project::AbstractDict)
              temporary, io = mktemp(dirname(path))
              try
                  TOML.print(io, project)
                  close(io)
                  mv(temporary, path; force = true)
              catch
                  isopen(io) && close(io)
                  ispath(temporary) && rm(temporary; force = true)
                  rethrow()
              end
              return nothing
          end

          function promote_test_extras(project::AbstractString, no_promote = String[])
              path = project_file(project)
              parsed = TOML.parsefile(path)
              extras = get(parsed, "extras", Dict{String, Any}())
              targets = get(parsed, "targets", Dict{String, Any}())
              test_target = get(targets, "test", String[])
              test_target isa AbstractVector || error("[targets].test must be an array in $path")
              excluded = Set(strip.(filter(!isempty, no_promote)))
              sources = Set(keys(get(parsed, "sources", Dict{String, Any}())))
              names = sort!(unique!(String.(test_target)))
              deps = get(parsed, "deps", Dict{String, Any}())
              for name in names
                  if haskey(extras, name) && haskey(deps, name) && deps[name] != extras[name]
                      error("$name has different UUIDs in [deps] and [extras] in $path")
                  end
              end
              targeted_extras = filter(name -> haskey(extras, name), names)
              skipped_no_promote = filter(name -> name ∈ excluded, targeted_extras)
              skipped_sources = filter(name -> name ∈ sources, targeted_extras)
              promoted = filter(names) do name
                  haskey(extras, name) && !haskey(deps, name) &&
                      name ∉ excluded && name ∉ sources
              end
              @info "Selected old-style test extras for the downgraded environment" project = path promoted skipped_no_promote skipped_sources
              isempty(promoted) && return promoted

              deps = get!(parsed, "deps", Dict{String, Any}())
              weakdeps = get(parsed, "weakdeps", nothing)
              for name in promoted
                  uuid = extras[name]
                  deps[name] = uuid
                  weakdeps isa AbstractDict && delete!(weakdeps, name)
              end
              weakdeps isa AbstractDict && isempty(weakdeps) && delete!(parsed, "weakdeps")
              write_project(path, parsed)
              @info "Promoted resolved test extras into [deps]" project = path promoted
              return promoted
          end

          function main(args)
              length(args) == 2 || error("usage: promote_test_extras.jl PROJECT NO_PROMOTE")
              no_promote = filter(!isempty, strip.(split(args[2], ',')))
              promote_test_extras(args[1], no_promote)
              return nothing
          end

          if PROGRAM_FILE == "-" || abspath(PROGRAM_FILE) == @__FILE__
              main(ARGS)
          end
          JULIA
      - name: "Install system packages"
        if: "${{ inputs.apt-packages != '' && runner.os == 'Linux' }}"
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ inputs.apt-packages }}
      - uses: julia-actions/julia-buildpkg@v1
        with:
          project: ${{ matrix.project }}
      - uses: julia-actions/julia-runtest@v1
        with:
          project: ${{ matrix.project }}
          allow_reresolve: false
      - name: "Restore the original project file"
        if: ${{ always() }}
        run: |
          if [ -n "${DOWNGRADE_PROJECT_BACKUP:-}" ] && [ -f "$DOWNGRADE_PROJECT_BACKUP" ]; then
            cp -- "$DOWNGRADE_PROJECT_BACKUP" "$DOWNGRADE_PROJECT_FILE"
            rm -- "$DOWNGRADE_PROJECT_BACKUP"
          fi
