name: "Reusable Sublibrary Downgrade Workflow"

# Runs downgrade-compat tests for each sublibrary under lib/*. The sublibrary
# list is discovered automatically (every lib/<name> with a Project.toml),
# minus any names in `exclude`.

on:
  workflow_call:
    inputs:
      julia-version:
        description: "Julia version to run the downgrade tests on (downgrade tests the minimum-supported Julia floor; defaults to the LTS alias 'lts', currently 1.10, tracking the LTS as it advances)"
        default: "lts"
        required: false
        type: string
      skip:
        description: "ADDITIONAL deps to skip when downgrading, beyond the auto-included Julia stdlibs and in-repo lib/* sublibraries (comma-separated; unioned into the effective skip passed to julia-downgrade-compat)"
        default: ""
        required: false
        type: string
      projects:
        description: "Space-separated explicit list of lib/* sublibrary paths to downgrade-test. If empty, every lib/<name> with a Project.toml is used (minus `exclude`)."
        default: ""
        required: false
        type: string
      exclude:
        description: "Space-separated lib/* sublibrary directory names to exclude (applies only when `projects` is empty / auto-discovery)"
        default: ""
        required: false
        type: string
      group-env-name:
        description: "Optional env var name to set as the test group for each sublibrary (e.g. ODEDIFFEQ_TEST_GROUP)"
        default: ""
        required: false
        type: string
      group-env-value:
        description: "Value for group-env-name, when set"
        default: ""
        required: false
        type: string

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      projects: ${{ steps.list.outputs.projects }}
      has_any: ${{ steps.list.outputs.has_any }}
    steps:
      - uses: actions/checkout@v6
      - name: "List lib/* sublibraries with a Project.toml (minus exclude)"
        id: list
        run: |
          EXPLICIT="${{ inputs.projects }}"
          EXCLUDE="${{ inputs.exclude }}"
          projects=()
          if [ -n "$EXPLICIT" ]; then
            for p in $EXPLICIT; do projects+=("$p"); done
          else
            for d in lib/*/; do
              d="${d%/}"
              [ -f "$d/Project.toml" ] || continue
              name="$(basename "$d")"
              skipit=false
              for ex in $EXCLUDE; do [ "$ex" = "$name" ] && skipit=true; done
              $skipit || projects+=("$d")
            done
          fi
          # Build the JSON array in pure shell -- neither jq nor python3 is
          # guaranteed on a self-hosted runner. lib/* names have no JSON-special
          # characters, so plain quoting is safe.
          json=""
          for p in "${projects[@]}"; do
            [ -n "$p" ] || continue
            if [ -z "$json" ]; then json="\"$p\""; else json="$json,\"$p\""; fi
          done
          json="[$json]"
          echo "Sublibraries: $json"
          echo "projects=$json" >> "$GITHUB_OUTPUT"
          [ "$json" = "[]" ] && echo "has_any=false" >> "$GITHUB_OUTPUT" || echo "has_any=true" >> "$GITHUB_OUTPUT"

  test:
    needs: discover
    if: needs.discover.outputs.has_any == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJson(needs.discover.outputs.projects) }}
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ inputs.julia-version }}
      - name: "Set sublibrary test group"
        if: "${{ inputs.group-env-name != '' }}"
        run: echo "${{ inputs.group-env-name }}=${{ inputs.group-env-value }}" >> "$GITHUB_ENV"
      - name: "Enumerate Julia standard libraries"
        run: |
          # Standard libraries are always in-tree at their pinned version, so
          # they must never be downgrade-pinned. Enumerate them robustly from
          # Pkg (the dict is keyed by UUID, so take the NAME from each value;
          # the value is (name, version) on recent Julia and a String on older).
          names="$(julia --startup-file=no -e '
            using Pkg
            ns = String[]
            for v in values(Pkg.Types.stdlibs())
                push!(ns, v isa AbstractString ? v : first(v))
            end
            println(join(sort(unique(ns)), ","))
          ')"
          echo "Julia stdlibs: $names"
          echo "STDLIB_SKIP=$names" >> "$GITHUB_ENV"
      - name: "Compute effective downgrade skip list"
        run: |
          # Effective skip = Julia stdlibs  ∪  in-repo lib/* sublibrary NAMES
          #                  ∪  the caller's `skip` input (extra skips).
          # In-repo path-[sources] sublibs must not be downgrade-pinned, so add
          # every lib/<name> directory name to the skip set.
          sublibs=""
          for d in lib/*/; do
            d="${d%/}"
            [ -f "$d/Project.toml" ] || continue
            name="$(basename "$d")"
            if [ -z "$sublibs" ]; then sublibs="$name"; else sublibs="$sublibs,$name"; fi
          done
          echo "In-repo sublibraries: $sublibs"
          effective="$STDLIB_SKIP"
          [ -n "$sublibs" ] && effective="$effective,$sublibs"
          [ -n "${{ inputs.skip }}" ] && effective="$effective,${{ inputs.skip }}"
          echo "Effective downgrade skip: $effective"
          echo "EFFECTIVE_SKIP=$effective" >> "$GITHUB_ENV"
      - uses: julia-actions/julia-downgrade-compat@v2
        with:
          projects: ${{ matrix.project }}
          skip: ${{ env.EFFECTIVE_SKIP }}
          julia_version: ${{ inputs.julia-version }}
      - uses: julia-actions/julia-buildpkg@v1
        with:
          project: ${{ matrix.project }}
      - uses: julia-actions/julia-runtest@v1
        with:
          project: ${{ matrix.project }}
          allow_reresolve: false
